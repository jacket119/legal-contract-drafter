<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" onclick="location.href='/'">
            <span class="nav-icon">⚖️</span>
            <span>{{ app_title }}</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_home %}{% endblock %}">🏠 首页</a>
            <a href="/settings" class="nav-link {% block nav_settings %}{% endblock %}">⚙️ 设置</a>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>⚠️ 免责声明：本工具生成的合同仅供参考，不构成法律建议。签署前请咨询专业律师。</p>
    </footer>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
